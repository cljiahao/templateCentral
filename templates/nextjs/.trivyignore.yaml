# These CVEs affect npm-internal packages (tar, minimatch, glob) bundled in the
# Node.js base image. They are not invoked at runtime — the production
# container only runs `node server.js` (Next.js standalone output).
# Re-evaluate when Node.js 24 bundles a patched npm version.

vulnerabilities:

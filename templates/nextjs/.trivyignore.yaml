    statement: 'minimatch ReDoS — npm-internal, not invoked at runtime'
  - id: CVE-2026-27903
    statement: 'minimatch ReDoS — npm-internal, not invoked at runtime'
  - id: CVE-2026-26996
    statement: 'minimatch ReDoS — npm-internal, not invoked at runtime'
  - id: CVE-2026-26960
    statement: 'tar path collision — npm-internal, no tar extraction at runtime'
  - id: CVE-2026-23950
    statement: 'tar symlink poisoning — npm-internal, no tar extraction at runtime'
  - id: CVE-2025-64756
    statement: 'glob CLI command injection — npm-internal CLI, not invoked at runtime'
